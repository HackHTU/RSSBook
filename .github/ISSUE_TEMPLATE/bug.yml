name: Bug Report
description: Report something that is broken or behaves incorrectly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the template below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: e.g. The GitHub Trending feed returns a 500 error when the language parameter is missing.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Request '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages, stack traces, and screenshots if applicable.
    validations:
      required: true

  - type: input
    id: route
    attributes:
      label: Affected route(s)
      description: The full URL path that triggered the issue.
      placeholder: /feeds/programming/github/trending
    validations:
      required: false

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      description: Which runtime are you using to run RSSBook?
      options:
        - Bun
        - Node.js
        - Deno
        - Cloudflare Workers
        - Netlify
        - Vercel
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: RSSBook version
      description: The version of RSSBook you are running (from package.json or OpenAPI docs).
      placeholder: 1.0.0
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, configuration, or logs that might help.
    validations:
      required: false

name: Feature Request
description: Suggest a new feature, source, or improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to suggest a new feature or improvement. If you want to add a new feed source, please also check whether `bun run source:new` works for you.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? Why is it useful?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you considered.
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Example routes, payloads, or screenshots that illustrate the feature.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area does this feature affect?
      options:
        - New feed source
        - Public instance
        - Core functionality
        - Documentation
        - Other
    validations:
      required: true

  - type: checkbox
    id: pr
    attributes:
      label: Contribution
      description: Would you like to work on this yourself?
      options:
        - label: I am willing to submit a PR for this feature.
